{% extends "base.html" %}
{% block title %}Server Error — InjuryAssist{% endblock %}

{% block content %}
<div class="fade-in">
  <div class="bg-white border border-blue-200 rounded-2xl shadow-sm p-8 max-w-2xl mx-auto text-center">
    <div class="mx-auto w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-4">
      <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Something went wrong</h1>
    <p class="text-gray-500 mt-2">Please try again in a moment.</p>
    <div class="mt-6">
      <a href="{{ url_for('auth.login') }}"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
